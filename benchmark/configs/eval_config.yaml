# BiTempQA + EvolBench 评估配置 (v3)
# 修复评估公平性：统一 top_k，启用所有系统，API key 从环境变量读取

# 评估模式: "unified" (retrieve->LLM generate->judge)
eval_mode: "unified"

# 被评估系统
systems:
  faiss:
    name: "FAISS Vector Store"
    type: "faiss"
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    top_k: 5
    enabled: true
  bm25:
    name: "BM25"
    type: "bm25"
    top_k: 5
    enabled: true
  naive_rag:
    name: "Naive RAG"
    type: "naive_rag"
    top_k: 5
    enabled: true
  simple_kg:
    name: "Simple KG"
    type: "simple_kg"
    enabled: true
  chroma:
    name: "ChromaDB"
    type: "chroma"
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    top_k: 5
    enabled: true
  mem0:
    name: "Mem0"
    type: "mem0"
    top_k: 5
    # Mem0 使用 SiliconFlow API 作为 LLM 后端
    llm_model: "Qwen/Qwen2.5-32B-Instruct"
    llm_base_url: "https://api.siliconflow.cn/v1"
    llm_api_key: "sk-xjakkyzbynwbvxvetpspqwnsrzfqblgkhkrfrrdmcgtqmwwz"
    enabled: true
  graphiti:
    name: "Graphiti"
    type: "graphiti"
    neo4j_uri: "bolt://localhost:7687"
    neo4j_user: "neo4j"
    neo4j_password: "tmg2024secure"
    enabled: true

# Answer Generator 配置（用于 unified 模式）
answer_generator:
  base_url: "https://api.siliconflow.cn/v1"
  api_key: "sk-xjakkyzbynwbvxvetpspqwnsrzfqblgkhkrfrrdmcgtqmwwz"
  model: "deepseek-ai/DeepSeek-V3"
  temperature: 0.0

# LLM Judge 配置
llm_judge:
  mode: "answer_judge"
  base_url: "https://api.siliconflow.cn/v1"
  api_key: "sk-xjakkyzbynwbvxvetpspqwnsrzfqblgkhkrfrrdmcgtqmwwz"
  model: "deepseek-ai/DeepSeek-V3"
  temperature: 0.0
  max_workers: 3
  timeout: 60

# 评估参数
evaluation:
  reset_between_scenarios: true
  query_timeout: 30000
  max_concurrent_queries: 1
  verbose_logging: true
  output_dir: "data/eval_results"

# 指标配置
metrics:
  primary: "accuracy"
  secondary:
    - "f1_score"
    - "temporal_reasoning_accuracy"
    - "version_recall"
  breakdowns:
    - "difficulty_level"
    - "question_type"
    - "scenario_type"
    - "requires_event_time_reasoning"
    - "requires_record_time_reasoning"

# 数据集配置
dataset:
  test_path: "data/validated/bitpqa_test_zh.json"
  scenarios_path: "data/generated/merged_v3/all_scenarios_v3.json"
  language: "zh"

# LoCoMo benchmark 配置
locomo:
  hf_repo: "Percena/locomo-mc10"
  enabled: true
