# BiTempQA + EvolBench 生成配置

# LLM API配置 (SiliconFlow)
llm:
  base_url: "https://api.siliconflow.cn/v1"
  api_key: "sk-xjakkyzbynwbvxvetpspqwnsrzfqblgkhkrfrrdmcgtqmwwz"
  generation_model: "Qwen/Qwen2.5-32B-Instruct"
  evaluation_model: "deepseek-ai/DeepSeek-V3"
  temperature: 0.7
  max_tokens: 4096
  timeout: 120

# 场景生成参数
scenario_generation:
  scenarios_per_type:
    S01_entity_attribute_evolution: 15
    S02_relationship_evolution: 12
    S03_contradictory_information: 12
    S04_late_arriving_facts: 15
    S05_future_dated_information: 12
    S06_entity_identity_resolution: 10
    S07_knowledge_retraction: 12
    S08_multi_source_information: 12
    S09_gradual_accumulation: 12
    S10_temporal_ambiguity: 10
  total_target: 122
  time_range:
    start: "2023-01-01T00:00:00"
    end: "2025-12-31T23:59:59"
  concurrent_requests: 3
  retry_max: 3
  retry_delay: 5

# QA对生成参数
qa_generation:
  pairs_per_scenario:
    min: 10
    max: 15
    target: 13
  difficulty_distribution:
    level_1: 0.45
    level_2: 0.35
    level_3: 0.20
  answer_type_distribution:
    multi_choice: 0.80
    abstractive: 0.15
    boolean: 0.05
  concurrent_requests: 3
  retry_max: 3
  retry_delay: 5

# 翻译配置
translation:
  model: "Qwen/Qwen2.5-72B-Instruct"
  source_language: "zh"
  target_language: "en"
  batch_size: 10
